name = "faai-forms"
main = "index.js"
compatibility_date = "2024-09-01"

# 查看提交记录的口令（建议改用 `wrangler secret put ADMIN_TOKEN` 存为密钥，更安全）
[vars]
# ADMIN_TOKEN 已通过 `wrangler secret put` 设为密钥（仓库公开，不存明文）
SITE_URL = "https://faai-astro-site.450311590.workers.dev"

# KV 命名空间：先运行 `wrangler kv namespace create FORM_SUBMISSIONS` 拿到 id 填到下面
[[kv_namespaces]]
binding = "FORM_SUBMISSIONS"
id = "a748e3ffeea14ea8975f52fa633e4969"
