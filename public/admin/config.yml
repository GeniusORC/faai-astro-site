# Decap CMS 配置（企工委官网）
# 改文件：把 REPO_OWNER / REPO_NAME 换成你的 GitHub 仓库，详见 SETUP.md
backend:
  name: github
  repo: GeniusORC/faai-astro-site
  branch: main
  # faai-astro-site 是 Cloudflare Workers 项目（非 Pages），functions/ 目录不生效。
  # 因此 OAuth 代理放在已部署的表单 Worker（faai-forms）里，Decap 通过它的域名登录。
  base_url: https://faai-forms.450311590.workers.dev
  auth_endpoint: /auth
  client_id: Ov23liigaiBfdCk6thtu    # GitHub OAuth App Client ID

# 本地预览（可选）：先跑 `npx decap-server`，再把下面一行取消注释
# local_backend: true

media_folder: "public/assets/uploads"   # 图片存到这里，自动进 Git
public_folder: "/assets/uploads"

# 发布的内容集合
collections:
  - name: "notices"
    label: "活动通知"
    label_singular: "活动通知"
    folder: "src/content/notices"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}.md"
    fields:
      - { label: "标题", name: "title", widget: "string", required: true }
      - { label: "发布日期", name: "date", widget: "datetime", required: true }
      - { label: "摘要", name: "excerpt", widget: "string" }
      - { label: "标签", name: "tags", widget: "list", field: { label: "标签", name: "tag", widget: "string" }, default: [] }
      - { label: "封面图", name: "cover", widget: "image" }
      - { label: "正文", name: "body", widget: "markdown", required: true }

  - name: "demands"
    label: "企业需求"
    label_singular: "企业需求"
    folder: "src/content/demands"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}.md"
    fields:
      - { label: "需求标题", name: "title", widget: "string", required: true }
      - { label: "发布日期", name: "date", widget: "datetime", required: true }
      - { label: "需求企业", name: "company", widget: "string", required: true }
      - { label: "需求类型", name: "category", widget: "select", options: ["技术攻关", "人才团队", "场景数据", "成果转化", "其他"], default: "技术攻关" }
      - { label: "联系方式", name: "contact", widget: "string", required: false, hint: "可填邮箱或电话，不填则显示 qigongwei@faai.org" }
      - { label: "摘要", name: "excerpt", widget: "string" }
      - { label: "正文", name: "body", widget: "markdown", required: true }

  - name: "experts"
    label: "专家名录"
    label_singular: "专家"
    folder: "src/content/experts"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}.md"
    fields:
      - { label: "姓名", name: "name", widget: "string", required: true }
      - { label: "职称/职务", name: "title", widget: "string", required: true }
      - { label: "所在单位", name: "org", widget: "string", required: true }
      - { label: "研究方向", name: "field", widget: "string", required: true }
      - { label: "电子邮箱", name: "email", widget: "string", required: false }
      - { label: "头像", name: "avatar", widget: "image", required: false }
      - { label: "排序", name: "order", widget: "number", default: 0, value_type: "int", required: false }
      - { label: "简介", name: "body", widget: "markdown", required: false }

  - name: "members"
    label: "会员名录"
    label_singular: "会员单位"
    folder: "src/content/members"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}.md"
    fields:
      - { label: "单位 / 个人名称", name: "org", widget: "string", required: true }
      - { label: "会员类型", name: "type", widget: "select", options: ["企业会员", "个人会员", "团体会员"], default: "企业会员" }
      - { label: "联系人", name: "contact", widget: "string", required: false }
      - { label: "联系电话", name: "phone", widget: "string", required: false }
      - { label: "电子邮箱", name: "email", widget: "string", required: false }
      - { label: "主营业务 / 研究方向", name: "business", widget: "text", required: false }
      - { label: "排序", name: "order", widget: "number", default: 0, value_type: "int", required: false }

  - name: "projects"
    label: "课题立项"
    label_singular: "课题"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}.md"
    fields:
      - { label: "课题名称", name: "title", widget: "string", required: true }
      - { label: "申报单位 / 负责人", name: "lead", widget: "string", required: true }
      - { label: "课题类型", name: "type", widget: "select", options: ["联合攻关", "企业委托", "学生课题", "开放课题"], default: "联合攻关" }
      - { label: "联系电话", name: "phone", widget: "string", required: false }
      - { label: "电子邮箱", name: "email", widget: "string", required: false }
      - { label: "课题摘要", name: "abstract", widget: "text", required: false }
      - { label: "排序", name: "order", widget: "number", default: 0, value_type: "int", required: false }

  # ---------- 站点级配置（单文件，可编辑整站外壳） ----------
  - name: "site"
    label: "站点配置"
    files:
      - name: "home"
        label: "首页横幅与轮播"
        file: "src/data/home.json"
        fields:
          - { label: "横幅标签", name: "hero_tag", widget: "string", required: false, hint: "横幅上方小标签，如「产学研 · 智能赋能」" }
          - { label: "横幅主标题", name: "hero_title", widget: "string", required: true }
          - { label: "横幅副文案", name: "hero_desc", widget: "text", required: false }
          - name: "hero_btns"
            label: "横幅按钮"
            label_singular: "按钮"
            widget: "list"
            summary: "{{fields.text}}"
            fields:
              - { label: "按钮文字", name: "text", widget: "string", required: true }
              - { label: "链接", name: "href", widget: "string", required: true, hint: "站内用 /xxx，页内锚点用 #modules，外链用 https://" }
              - { label: "样式", name: "style", widget: "select", options: [{ label: "主按钮(实心)", value: "primary" }, { label: "次按钮(描边)", value: "ghost" }], default: "primary" }
          - name: "slides"
            label: "活动精选轮播"
            label_singular: "轮播图"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "图片", name: "img", widget: "image", required: true }
              - { label: "标题", name: "title", widget: "string", required: true }
              - { label: "副标题", name: "sub", widget: "string", required: false }
          - name: "modules"
            label: "服务大厅卡片"
            label_singular: "服务卡片"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "图标(emoji)", name: "icon", widget: "string", required: false }
              - { label: "标题", name: "title", widget: "string", required: true }
              - { label: "描述", name: "desc", widget: "text", required: false }
              - { label: "按钮文字", name: "btn", widget: "string", required: false }
              - { label: "链接", name: "href", widget: "string", required: true }
      - name: "siteinfo"
        label: "站点信息（导航/页脚/公告）"
        file: "src/data/site.json"
        fields:
          - name: "nav"
            label: "顶部导航菜单"
            label_singular: "菜单项"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "菜单文字", name: "label", widget: "string", required: true }
              - { label: "链接", name: "href", widget: "string", required: true }
          - { label: "联系邮箱", name: "contact_email", widget: "string", required: false }
          - { label: "页脚简介", name: "footer_about", widget: "text", required: false }
          - { label: "页脚版权(留空用站点名)", name: "footer_copyright", widget: "string", required: false }
          - { label: "顶部公告文字(留空不显示)", name: "top_announce_text", widget: "string", required: false }
          - { label: "公告链接(可选)", name: "top_announce_link", widget: "string", required: false }
